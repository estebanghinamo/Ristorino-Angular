<div class="modal-body message-modal">


  <div class="icon warning">
    <i class="bi bi-exclamation-triangle-fill"></i>
  </div>


  <h5 class="modal-title">
    {{ title || 'Confirmar acción' }}
  </h5>


  <p class="modal-text">
    {{ text }}
  </p>

  
  <div class="modal-actions">
    <button class="btn btn-primary" i18n="@@confirm-dialog-accept" (click)="confirmar()">
      Aceptar
    </button>

    <button class="btn btn-outline-secondary ms-2" i18n="@@confirm-dialog-cancel" (click)="cancelar()">
      Cancelar
    </button>
  </div>

</div>
